<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>GALLERY</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src='main.js'></script>
    <style>
        body 
        {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            box-sizing: border-box;
            background-color: black;
        }
        #leftslider
        {
            width: 85%;
            float: left;
        }
        #rightslider
        {
            width: 13%;
            float: right;
        }
        h1
        {
            color: white;
            font-size: 32px;
        }
        .content ul li 
        {
            list-style-type: none;
            text-align: right;
            margin-right: 15%;
        }
        .content ul li a
        {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
        }
        .content ul li a:hover
        {
            color: red;
        }
        .content span
        {
            color: white;
            font-size: 20px;
            letter-spacing: 25px;
            margin-left: 6%;
            margin-top: 7%;
        }
    </style>
</head>
<body>
    <section id="leftslider">
        <div class="row-1">
            <img src="image/gallery-1.jpg">
            <img src="image/gallery-2.jpg">
        </div>
<img src="image/gallery-3.jpg">
<img src="image/gallery-4.jpg">
<img src="image/gallery-5.jpg">
<img src="image/gallery-6.jpg">
<img src="image/gallery-7.jpg">
<img src="image/gallery-8.jpg">
<img src="image/gallery-9.jgallery-pg">
<img src="image/gallery-10.jpg">
    </section>

    <section id="rightslider">
        <div class="content">
        <h1>SHUTTER</h1>
        <ul>
            <li><a href="">home</a></li>
            <li><a href="">photos</a></li>
            <li><a href="">bio</a></li>
            <li><a href="">blog</a></li>
            <li><a href="">contact</a></li>
        </ul>
    
        <span class="fa fa-facebook"></span>
        <span class="fa fa-twitter"></span>
        <span class="fa fa-instagram"></span>
    </div>
    </section>
</body>
</html>
